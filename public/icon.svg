<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="100%" stop-color="#0f0f11" />
    </radialGradient>
    
    <!-- Golden Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Halos and Rays style -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Solid rounded base background for squircle mask compatibility -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Ambient Golden Glow -->
  <circle cx="256" cy="240" r="180" fill="url(#glowGrad)" />

  <!-- Outer Ring -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.4" stroke-dasharray="12 6" />

  <!-- Abstract Africa Silhouette in background of Bible -->
  <path d="M220,110 
           C260,105 285,120 310,140 
           C325,152 355,160 365,185 
           C375,210 330,230 335,260 
           C340,290 350,310 325,340 
           C305,364 285,395 270,410 
           C260,420 252,410 245,390 
           C235,360 220,350 210,330 
           C195,300 170,280 162,250 
           C155,220 165,200 170,180 
           C174,165 178,135 200,115
           Z" 
        fill="url(#goldGrad)" 
        opacity="0.12" />

  <!-- Holy Radiance Rays -->
  <g stroke="url(#goldGrad)" stroke-width="2" opacity="0.3">
    <line x1="256" y1="240" x2="256" y2="150" />
    <line x1="256" y1="240" x2="330" y2="180" />
    <line x1="256" y1="240" x2="340" y2="240" />
    <line x1="256" y1="240" x2="310" y2="300" />
    <line x1="256" y1="240" x2="256" y2="320" />
    <line x1="256" y1="240" x2="202" y2="300" />
    <line x1="256" y1="240" x2="172" y2="240" />
    <line x1="256" y1="240" x2="182" y2="180" />
  </g>

  <!-- Open Bible Stylized Book -->
  <g transform="translate(136, 175)">
    <!-- Behind base shadow -->
    <path d="M120,115 C100,105 40,105 10,110 L10,18 C40,12 100,12 120,25 Z" fill="#000" opacity="0.2" transform="translate(4, 4)" />
    <path d="M120,115 C140,105 200,105 230,110 L230,18 C200,12 140,12 120,25 Z" fill="#000" opacity="0.2" transform="translate(4, 4)" />

    <!-- Hardcover backing backplates -->
    <path d="M120,118 C100,107 35,107 5,113 L5,16 C35,10 100,10 120,22 Z" fill="#78350f" stroke="#b45309" stroke-width="2" />
    <path d="M120,118 C140,107 205,107 235,113 L235,16 C205,10 140,10 120,22 Z" fill="#78350f" stroke="#b45309" stroke-width="2" />

    <!-- Core Pages (Gold edges) -->
    <path d="M120,114 C100,103 40,103 10,108 L10,13 C40,8 100,8 120,18 Z" fill="#fbbf24" opacity="0.8" />
    <path d="M120,114 C140,103 200,103 230,108 L230,13 C200,8 140,8 120,18 Z" fill="#fbbf24" opacity="0.8" />

    <!-- Top Main White Pages -->
    <path d="M120,110 C100,99 43,99 15,104 L15,9 C43,4 100,4 120,14 Z" fill="#fafafa" stroke="#d4d4d8" stroke-width="1" />
    <path d="M120,110 C140,99 197,99 225,104 L225,9 C197,4 140,4 120,14 Z" fill="#fafafa" stroke="#d4d4d8" stroke-width="1" />

    <!-- Ribbon Marker -->
    <path d="M117,14 L117,130 C117,133 123,133 123,130 L123,14 Z" fill="#dc2626" />
    <path d="M117,130 L113,124 L123,130" fill="#dc2626" />

    <!-- Cross Symbol on Left Page -->
    <path d="M60,35 L70,35 L70,25 L75,25 L75,35 L85,35 L85,40 L75,40 L75,60 L70,60 L70,40 L60,40 Z" fill="#18181b" opacity="0.8" />

    <!-- Aesthetic text lines/verses representation -->
    <!-- Left page text lines -->
    <line x1="30" y1="68" x2="105" y2="68" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="30" y1="78" x2="95" y2="78" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="30" y1="88" x2="105" y2="88" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />

    <!-- Right page text lines -->
    <line x1="135" y1="30" x2="210" y2="30" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="40" x2="200" y2="40" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="50" x2="210" y2="50" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="60" x2="190" y2="60" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="70" x2="210" y2="70" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="80" x2="205" y2="80" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="135" y1="90" x2="185" y2="90" stroke="#71717a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  </g>
</svg>
