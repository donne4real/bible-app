<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Diagonal Gradient -->
    <linearGradient id="bgGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#b45309" />    <!-- Rich rust orange on top-left -->
      <stop offset="25%" stop-color="#7c2d12" />   <!-- Deep burnt sienna -->
      <stop offset="70%" stop-color="#0f172a" />   <!-- Deep midnight blue -->
      <stop offset="100%" stop-color="#020617" />  <!-- Darkest navy on bottom-right -->
    </linearGradient>

    <!-- Outer Yellow/Cyan Glow Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9" />  <!-- Warm yellow-gold -->
      <stop offset="40%" stop-color="#ea580c" stop-opacity="0.6" />  <!-- Rusty amber -->
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.8" /> <!-- Cosmic cyan-blue -->
    </linearGradient>

    <!-- Book Spine/Cover Linear Gradient -->
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Left Page Sheen -->
    <linearGradient id="pageSilverGradLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="20%" stop-color="#f8fafc" />
      <stop offset="90%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Right Page Sheen -->
    <linearGradient id="pageSilverGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="10%" stop-color="#ffffff" />
      <stop offset="80%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Africa Gold/Orange half -->
    <linearGradient id="africaGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Africa Green half -->
    <linearGradient id="africaGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#065f46" />
    </linearGradient>

    <!-- Flame Layers Gradients -->
    <linearGradient id="flameOuterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />  <!-- Soft top red -->
      <stop offset="40%" stop-color="#ef4444" /> <!-- Crimson -->
      <stop offset="100%" stop-color="#c2410c" /> <!-- Burnt orange base -->
    </linearGradient>

    <linearGradient id="flameMiddleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />  <!-- Light orange -->
      <stop offset="100%" stop-color="#ea580c" /> <!-- Intense orange -->
    </linearGradient>

    <linearGradient id="flameInnerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />  <!-- White core -->
      <stop offset="40%" stop-color="#fef08a" /> <!-- Soft yellow -->
      <stop offset="100%" stop-color="#f59e0b" /> <!-- Amber base -->
    </linearGradient>

    <!-- Ambient Shadow Filter -->
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020617" flood-opacity="0.65" />
    </filter>

    <!-- Flame Backlight Glow Filter -->
    <filter id="flameGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. BASE SQUIRCLE FRAME -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- 2. STAGE GLOW EFFECT / OUTER HIGHLIGHT EMBOSS -->
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="url(#borderGrad)" stroke-width="5" opacity="0.8" />

  <!-- 3. MAIN COMPOSITION GROUP (WITH AMBIENT DROPSHADOW) -->
  <g filter="url(#ambientShadow)">

    <!-- 3A. STYLIZED OPEN BIBLE -->
    <g transform="translate(0, 20)">
      
      <!-- Cover backing/underlay (rim of the open book on layout) -->
      <path d="M 120,290 C 175,275 220,274 256,286 C 292,274 337,275 392,290 L 392,165 C 337,150 292,149 256,161 C 220,149 175,150 120,165 Z" fill="url(#coverGrad)" stroke="#090514" stroke-width="2" />
      
      <!-- Pages thickness gold stack -->
      <path d="M 124,285 C 178,270 221,269 256,281 C 291,269 334,270 388,285 L 388,161 C 334,146 291,145 256,157 C 221,145 178,146 124,161 Z" fill="#d97706" opacity="0.95" />

      <!-- Top Silver-White Sheets (Left and Right page splits) -->
      <path d="M 128,280 C 180,265 222,264 256,276 L 256,152 C 222,140 180,141 128,156 Z" fill="url(#pageSilverGradLeft)" stroke="#334155" stroke-width="1.2" />
      <path d="M 384,280 C 332,265 290,264 256,276 L 256,152 C 290,140 332,141 384,156 Z" fill="url(#pageSilverGradRight)" stroke="#334155" stroke-width="1.2" />

      <!-- Center spine gutter shadow of book -->
      <path d="M 254,152 L 258,152 L 258,276 L 254,276 Z" fill="#1e293b" opacity="0.5" />
    </g>

    <!-- 3B. AFRICA OUTLINE MAP LAYER (Directly overlapping the pages) -->
    <!-- Colored split continent: Gold on left, Vibrant green on right -->
    <g transform="translate(0, 10)">
      
      <!-- Madagascar Island (Green) -->
      <path d="M 360,250 C 362,246 366,248 365,254 C 364,260 361,267 358,265 C 356,263 358,255 360,250 Z" fill="url(#africaGreenGrad)" stroke="#020617" stroke-width="2" />

      <!-- Left half of Africa (Gold gradient) -->
      <path d="M 256,120 
               C 225,120 205,121 185,124
               C 165,127 150,141 145,166
               C 140,188 142,204 165,214
               C 180,221 190,214 200,226
               C 210,238 215,251 220,262
               C 228,280 236,290 246,300
               C 250,304 253,308 256,312
               L 256,120 Z" 
            fill="url(#africaGoldGrad)" 
            stroke="#020617" 
            stroke-width="2.5" 
            stroke-linejoin="round" />

      <!-- Right half of Africa (Green gradient) -->
      <path d="M 256,120
               C 278,120 292,125 304,131
               C 316,137 322,148 322,158
               C 322,168 330,173 340,178
               C 348,183 354,198 344,208
               C 334,218 325,218 320,228
               C 315,238 310,248 304,258
               C 292,278 280,288 270,298
               C 264,304 260,308 256,312
               L 256,120 Z" 
            fill="url(#africaGreenGrad)" 
            stroke="#020617" 
            stroke-width="2.5" 
            stroke-linejoin="round" />
    </g>

    <!-- 3C. THE HOLY SPIRIT FIRE FLAME (Centered in the layout) -->
    <!-- Backlighting fire glow -->
    <circle cx="256" cy="205" r="50" fill="#f59e0b" opacity="0.35" filter="url(#flameGlow)" />

    <!-- Layered vector flame graphics -->
    <g transform="translate(0, 5)">
      
      <!-- 1. Outer flame (Crimson/Red edge) -->
      <path d="M 256,135
               C 240,157 218,181 216,203
               C 214,223 226,240 242,246
               C 247,248 252,250 256,250
               C 260,250 265,248 270,246
               C 286,240 298,223 296,203
               C 294,181 272,157 256,135 Z"
            fill="url(#flameOuterGrad)"
            stroke="#1e293b"
            stroke-width="3.5"
            stroke-linejoin="round" />

      <!-- 2. Middle flame (Vibrant Orange tongues) -->
      <path d="M 256,152
               C 244,171 228,190 227,208
               C 226,223 234,235 246,238
               C 251,239 253,240 256,240
               C 259,240 261,239 266,238
               C 278,235 286,223 285,208
               C 284,190 268,171 256,152 Z"
            fill="url(#flameMiddleGrad)" />

      <!-- 3. Inner flame (Bright Glowing Yellow/White Core) -->
      <path d="M 256,175
               C 247,189 239,201 239,213
               C 239,223 245,229 256,229
               C 267,229 273,223 273,213
               C 273,201 265,189 256,175 Z"
            fill="url(#flameInnerGrad)" />
    </g>

  </g> <!-- END COMPOSITION GROUP -->

  <!-- 4. BRAND TYPOGRAPHY / LABELS AT THE BOTTOM OF LOGO -->
  <!-- Clean premium modern tracking display typography -->
  <g font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif" text-anchor="middle">
    
    <!-- Heavy drop shadow behind brand title -->
    <text x="256" y="414" font-weight="900" font-size="34" fill="#020617" opacity="0.75" letter-spacing="1">WORD UP AFRICA</text>
    <text x="256" y="451" font-weight="700" font-size="16" fill="#020617" opacity="0.75" letter-spacing="4.5">BIBLE READER</text>

    <!-- High-contrast glossy white text foreground -->
    <text x="250" y="410" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="1" opacity="0.1">WORD UP AFRICA</text> <!-- Offset shine -->
    <text x="256" y="410" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="1">WORD UP AFRICA</text>
    <text x="256" y="447" font-weight="700" font-size="16" fill="#f8fafc" letter-spacing="4.5">BIBLE READER</text>
  </g>

</svg>
