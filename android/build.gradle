// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // Redirect build outputs outside OneDrive to prevent file-locking on Windows.
    // Override ANDROID_BUILD_DIR in CI or on other OSes to use a different root.
    def buildRoot = System.getenv("ANDROID_BUILD_DIR") ?: "C:/AndroidBuild"
    project.buildDir = new File("${buildRoot}/${rootProject.name}/${project.name}")
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
